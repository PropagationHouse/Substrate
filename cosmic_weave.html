<!DOCTYPE html>
<html>
<head>
<title>The Cosmic Weave</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #000010 0%, #000000 100%); /* Deep cosmic void */
    cursor: none;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="cosmicCanvas"></canvas>

<script>
  const canvas = document.getElementById("cosmicCanvas");
  const ctx = canvas.getContext("2d");

  let width = window.innerWidth;
  let height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;

  window.addEventListener("resize", () => {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    initWeave();
  });

  const config = {
    numNodes: 200,
    nodeMinSize: 1.0,
    nodeMaxSize: 3.5,
    nodeSpeed: 0.2,
    connectionDistance: 120,
    connectionDecay: 0.005,
    connectionStrengthFactor: 0.008,
    attractionForce: 0.00008,
    repulsionForce: 0.0002,
    repulsionRadius: 30,
    spawnRate: 0.005, // Chance per frame to spawn a new node
    maxLife: 1000, // Frames a node lives
    pulseSpeed: 0.05,
    auraDensity: 0.000005,
    auraColor: 'rgba(50, 100, 200, 0.05)'
  };

  class Node {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * config.nodeSpeed;
      this.vy = (Math.random() - 0.5) * config.nodeSpeed;
      this.size = Math.random() * (config.nodeMaxSize - config.nodeMinSize) + config.nodeMinSize;
      this.baseColor = `hsl(${Math.random() * 60 + 220}, 40%, 30%)`;
      this.color = this.baseColor;
      this.life = Math.random() * config.maxLife; // Start at a random life stage
      this.maxLife = config.maxLife;
      this.pulse = Math.random() * Math.PI * 2;
      this.charge = Math.random(); // Represents its "potential" or "activity"
    }

    update() {
      // Movement
      this.x += this.vx;
      this.y += this.vy;

      // Bounce off walls
      if (this.x < 0 || this.x > width) this.vx *= -1;
      if (this.y < 0 || this.y > height) this.vy *= -1;

      // Dampen speed
      this.vx *= 0.99;
      this.vy *= 0.99;

      // Life cycle
      this.life++;
      if (this.life > this.maxLife) {
        this.life = 0; // Reset or mark for removal
        this.x = Math.random() * width; // Respawn at random location
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * config.nodeSpeed;
        this.vy = (Math.random() - 0.5) * config.nodeSpeed;
        this.size = Math.random() * (config.nodeMaxSize - config.nodeMinSize) + config.nodeMinSize;
        this.baseColor = `hsl(${Math.random() * 60 + 220}, 40%, 30%)`;
        this.charge = Math.random();
      }

      // Pulsate charge and size
      this.pulse += config.pulseSpeed;
      this.charge = (Math.sin(this.pulse) + 1) / 2; // Oscillate between 0 and 1

      // Color based on charge and life
      const hue = parseFloat(this.baseColor.match(/hsl\((\d+)/)[1]);
      const saturation = 40 + this.charge * 15;
      const lightness = 30 + this.charge * 15 * (this.life / this.maxLife);
      this.color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    draw() {
      const currentSize = this.size * (1 + this.charge * 0.8);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const nodes = [];

  function initWeave() {
    nodes.length = 0;
    for (let i = 0; i < config.numNodes; i++) {
      nodes.push(new Node(Math.random() * width, Math.random() * height));
    }
  }

  function connectNodes() {
    for (let a = 0; a < nodes.length; a++) {
      for (let b = a + 1; b < nodes.length; b++) {
        const nodeA = nodes[a];
        const nodeB = nodes[b];

        const dx = nodeA.x - nodeB.x;
        const dy = nodeA.y - nodeB.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Repulsion
        if (dist < config.repulsionRadius && dist > 0) {
          const force = (config.repulsionRadius - dist) / config.repulsionRadius * config.repulsionForce;
          const angle = Math.atan2(dy, dx);
          nodeA.vx += Math.cos(angle) * force;
          nodeA.vy += Math.sin(angle) * force;
          nodeB.vx -= Math.cos(angle) * force;
          nodeB.vy -= Math.sin(angle) * force;
        }

        // Attraction
        if (dist < config.connectionDistance) {
          const force = config.attractionForce * (dist / config.connectionDistance);
          nodeA.vx -= dx * force;
          nodeA.vy -= dy * force;
          nodeB.vx += dx * force;
          nodeB.vy += dy * force;

          // Draw connection
          const connectionStrength = (1 - dist / config.connectionDistance) * ((nodeA.charge + nodeB.charge) / 2);
          if (connectionStrength > 0.05) { // Only draw significant connections
            ctx.strokeStyle = `rgba(150, 200, 255, ${connectionStrength * 0.6})`;
            ctx.lineWidth = 0.5 + connectionStrength * 2;
            ctx.beginPath();
            ctx.moveTo(nodeA.x, nodeA.y);
            ctx.lineTo(nodeB.x, nodeB.y);
            ctx.stroke();
          }
        }
      }
    }
  }

  function drawAura() {
    ctx.fillStyle = config.auraColor;
    ctx.fillRect(0, 0, width, height); // Subtle overlay
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);
    drawAura(); // Draw the subtle background aura first

    connectNodes();

    for (let i = nodes.length - 1; i >= 0; i--) {
      const node = nodes[i];
      node.update();
      node.draw();
    }

    // Occasionally spawn new nodes to maintain density and dynamism
    if (Math.random() < config.spawnRate && nodes.length < config.numNodes * 1.2) { // Cap max nodes
      nodes.push(new Node(Math.random() * width, Math.random() * height));
    }

    requestAnimationFrame(animate);
  }

  initWeave();
  animate();
</script>

</body>
</html>
