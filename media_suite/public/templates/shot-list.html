<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shot List Template - Media Planning Suite</title>
    <link href="/css/styles.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="glass-card p-6 mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold gradient-text mb-2">Shot List</h1>
                    <p class="text-gray-300">Media Plan: <span id="plan-title">Loading...</span></p>
                </div>
                <div class="flex space-x-4">
                    <button onclick="addShot()" class="glass-button bg-gradient-to-r from-blue-500 to-purple-500">
                        <i class="fas fa-plus mr-2"></i>Add Shot
                    </button>
                    <button onclick="exportShotList()" class="glass-button">
                        <i class="fas fa-download mr-2"></i>Export PDF
                    </button>
                    <button onclick="window.close()" class="glass-button">
                        <i class="fas fa-times mr-2"></i>Close
                    </button>
                </div>
            </div>
        </div>

        <!-- Shot List Container -->
        <div id="shot-list-container" class="space-y-6">
            <!-- Shots will be populated here -->
        </div>

        <!-- Add Shot Modal -->
        <div id="add-shot-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
            <div class="glass-card max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div class="p-6">
                    <h3 class="text-2xl font-bold mb-6">Add New Shot</h3>
                    <form id="shot-form" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Shot Title</label>
                                <input type="text" id="shot-title" class="brand-input" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-2">Shot Type</label>
                                <select id="shot-type" class="brand-input">
                                    <option value="wide">Wide Shot</option>
                                    <option value="medium">Medium Shot</option>
                                    <option value="close-up">Close-up</option>
                                    <option value="detail">Detail Shot</option>
                                    <option value="action">Action Shot</option>
                                    <option value="interview">Interview</option>
                                    <option value="b-roll">B-Roll</option>
                                    <option value="product">Product Shot</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-2">Location</label>
                                <input type="text" id="shot-location" class="brand-input" placeholder="e.g., Main Office, Studio, Outdoor">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium mb-2">Time Needed</label>
                                <input type="text" id="shot-time" class="brand-input" placeholder="e.g., 30 minutes, 1 hour">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Equipment Needed</label>
                            <textarea id="shot-equipment" rows="3" class="brand-input" placeholder="Camera, lighting, audio equipment, props..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Description & Notes</label>
                            <textarea id="shot-description" rows="4" class="brand-input" placeholder="Describe the shot, composition, lighting, mood, specific requirements..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Reference Images</label>
                            <div class="border-2 border-dashed border-glass-border rounded-lg p-4 text-center">
                                <input type="file" id="shot-images" multiple accept="image/*" class="hidden">
                                <button type="button" onclick="document.getElementById('shot-images').click()" class="glass-button">
                                    <i class="fas fa-upload mr-2"></i>Upload Reference Images
                                </button>
                                <p class="text-sm text-gray-400 mt-2">Upload multiple images for reference</p>
                            </div>
                        </div>
                        
                        <div class="flex justify-end space-x-4">
                            <button type="button" onclick="closeShotModal()" class="glass-button">
                                Cancel
                            </button>
                            <button type="submit" class="glass-button bg-gradient-to-r from-blue-500 to-purple-500">
                                <i class="fas fa-save mr-2"></i>Save Shot
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Shot List Management
        let planId = new URLSearchParams(window.location.search).get('plan_id');
        let shots = [];

        async function loadShotList() {
            try {
                const response = await fetch(`/api/shot-lists?plan_id=${planId}`);
                shots = await response.json();
                
                // Load plan details
                const planResponse = await fetch(`/api/media-plans/${planId}`);
                const plan = await planResponse.json();
                document.getElementById('plan-title').textContent = plan.title;
                
                renderShotList();
            } catch (error) {
                console.error('Error loading shot list:', error);
            }
        }

        function renderShotList() {
            const container = document.getElementById('shot-list-container');
            
            if (shots.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-camera text-6xl text-gray-400 mb-4"></i>
                        <h3 class="text-xl font-bold mb-2">No Shots Yet</h3>
                        <p class="text-gray-400 mb-4">Start building your shot list by adding your first shot.</p>
                        <button onclick="addShot()" class="glass-button bg-gradient-to-r from-blue-500 to-purple-500">
                            <i class="fas fa-plus mr-2"></i>Add Your First Shot
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = shots.map((shot, index) => `
                <div class="shot-list-item" data-shot-id="${shot.id}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <div class="flex items-center space-x-3 mb-2">
                                <span class="text-lg font-bold text-primary-400">#${index + 1}</span>
                                <h3 class="text-xl font-bold">${shot.title}</h3>
                                <span class="px-3 py-1 rounded-full text-xs font-medium bg-glass-background">
                                    ${shot.shot_type}
                                </span>
                            </div>
                            <p class="text-gray-300 mb-4">${shot.description}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editShot('${shot.id}')" class="glass-button px-3 py-2">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteShot('${shot.id}')" class="glass-button px-3 py-2">
                                <i class="fas fa-trash"></i>
                            </button>
                            <button onclick="toggleShotComplete('${shot.id}')" class="glass-button px-3 py-2">
                                <i class="fas fa-check${shot.completed ? '' : '-o'}"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-glass-background rounded-lg p-3">
                            <p class="text-sm font-medium text-gray-400 mb-1">Location</p>
                            <p class="flex items-center">
                                <i class="fas fa-map-marker-alt mr-2 text-primary-400"></i>
                                ${shot.location || 'Not specified'}
                            </p>
                        </div>
                        
                        <div class="bg-glass-background rounded-lg p-3">
                            <p class="text-sm font-medium text-gray-400 mb-1">Time Needed</p>
                            <p class="flex items-center">
                                <i class="fas fa-clock mr-2 text-primary-400"></i>
                                ${shot.time_needed || 'Not specified'}
                            </p>
                        </div>
                        
                        <div class="bg-glass-background rounded-lg p-3">
                            <p class="text-sm font-medium text-gray-400 mb-1">Equipment</p>
                            <p class="flex items-center">
                                <i class="fas fa-tools mr-2 text-primary-400"></i>
                                ${shot.equipment ? 'View details' : 'Not specified'}
                            </p>
                        </div>
                    </div>
                    
                    ${shot.equipment ? `
                        <div class="mt-4 bg-glass-background rounded-lg p-3">
                            <p class="text-sm font-medium text-gray-400 mb-2">Equipment Details</p>
                            <p class="text-sm">${shot.equipment}</p>
                        </div>
                    ` : ''}
                    
                    ${shot.images ? `
                        <div class="mt-4">
                            <p class="text-sm font-medium text-gray-400 mb-2">Reference Images</p>
                            <div class="flex space-x-2">
                                ${JSON.parse(shot.images).map(img => `
                                    <img src="${img}" alt="Reference" class="w-20 h-20 object-cover rounded-lg cursor-pointer hover:scale-105 transition-transform">
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function addShot() {
            document.getElementById('add-shot-modal').classList.remove('hidden');
            document.getElementById('shot-form').reset();
        }

        function closeShotModal() {
            document.getElementById('add-shot-modal').classList.add('hidden');
        }

        async function saveShot(e) {
            e.preventDefault();
            
            const shotData = {
                plan_id: planId,
                title: document.getElementById('shot-title').value,
                shot_type: document.getElementById('shot-type').value,
                location: document.getElementById('shot-location').value,
                time_needed: document.getElementById('shot-time').value,
                equipment: document.getElementById('shot-equipment').value,
                description: document.getElementById('shot-description').value
            };

            try {
                const response = await fetch('/api/shot-lists', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(shotData)
                });

                if (response.ok) {
                    const newShot = await response.json();
                    shots.push(newShot);
                    renderShotList();
                    closeShotModal();
                    showNotification('Shot added successfully!', 'success');
                } else {
                    throw new Error('Failed to add shot');
                }
            } catch (error) {
                showNotification(error.message, 'error');
            }
        }

        async function deleteShot(shotId) {
            if (!confirm('Are you sure you want to delete this shot?')) return;

            try {
                const response = await fetch(`/api/shot-lists/${shotId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    shots = shots.filter(shot => shot.id !== shotId);
                    renderShotList();
                    showNotification('Shot deleted successfully!', 'success');
                } else {
                    throw new Error('Failed to delete shot');
                }
            } catch (error) {
                showNotification(error.message, 'error');
            }
        }

        async function toggleShotComplete(shotId) {
            const shot = shots.find(s => s.id === shotId);
            if (!shot) return;

            try {
                const response = await fetch(`/api/shot-lists/${shotId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !shot.completed })
                });

                if (response.ok) {
                    shot.completed = !shot.completed;
                    renderShotList();
                    showNotification(`Shot marked as ${shot.completed ? 'complete' : 'incomplete'}!`, 'success');
                } else {
                    throw new Error('Failed to update shot');
                }
            } catch (error) {
                showNotification(error.message, 'error');
            }
        }

        function exportShotList() {
            // This would generate a PDF export
            window.print();
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 z-50 glass-card p-4 max-w-sm transform translate-x-full transition-transform duration-300`;
            
            const colors = {
                success: 'text-green-400',
                error: 'text-red-400',
                info: 'text-blue-400'
            };
            
            notification.innerHTML = `
                <div class="flex items-center space-x-3">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} ${colors[type]}"></i>
                    <p class="flex-1">${message}</p>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.remove('translate-x-full');
            }, 100);
            
            setTimeout(() => {
                notification.classList.add('translate-x-full');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Event listeners
        document.getElementById('shot-form').addEventListener('submit', saveShot);

        // Initialize
        loadShotList();
    </script>
</body>
</html>
